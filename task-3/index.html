<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📘todo task manger</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <h1>Todo Weather App</h1>

    
    <form id="todoForm">

      <input
        type="text"
        id="taskInput"
        placeholder="Enter Task"
        required
      />

      <button type="submit">Add Task</button>

    </form>

  
    <input
      type="text"
      id="searchInput"
      placeholder="Search Task"
    />

    <div id="todoList"></div>

    
  

  <script src="script.js"></script>

</body>
</html>
